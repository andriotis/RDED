# Cross-architecture matrix: distill with one arch, train student with a
# different arch. Tests OCKL's hypothesized arch-invariance benefit.
#
# Run: python scripts/run_sweep.py scripts/sweeps/cross_arch.yaml [--resume] [--dry-run]
#
# Cells: 4 directional pairs x 3 ipcs x 3 seeds x 2 weight configs = 72 total.

defaults:
  seed: [42, 43, 44]
  ipc: [1, 10, 50]
  weights:
    - {kl: 1.0}
    - {kl: 1.0, ockl: 1.0}
  factor: 1
  num_crop: 5
  mipc: 300
  re_epochs: 300

experiments:
  - name: cifar100_conv3_to_resnet18
    dataset: cifar100
    arch: conv3
    stud_arch: resnet18_modified

  - name: cifar100_resnet18_to_conv3
    dataset: cifar100
    arch: resnet18_modified
    stud_arch: conv3

  - name: tinyimagenet_conv4_to_resnet18
    dataset: tinyimagenet
    arch: conv4
    stud_arch: resnet18_modified

  - name: tinyimagenet_resnet18_to_conv4
    dataset: tinyimagenet
    arch: resnet18_modified
    stud_arch: conv4

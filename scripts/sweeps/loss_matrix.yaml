# Loss matrix: KL baseline AND KL+OCKL across both datasets and all compatible
# (arch, ipc, seed) combinations. Uses the list-of-dicts shape for `weights:`
# so each cell expands into 2 alternative configurations (one per dict).
#
# Run: python scripts/run_sweep.py scripts/sweeps/loss_matrix.yaml [--resume] [--dry-run]
#
# Cells: 4 (dataset, arch) blocks x 3 ipcs x 3 seeds x 2 weight configs = 72 total.

defaults:
  seed: [42, 43, 44]
  ipc: [1, 10 ,50]
  weights:
    - {kl: 1.0}                  # stock RDED baseline
    # - {kl: 1.0, ockl: 1.0}       # KL + one-cold KL (existing)
    # - {gce: 1.0}                 # pure GCE (q=0.7 default via --gce-q)
    # - {kl: 1.0, rce: 1.0}        # SCE = alpha*CE + beta*RCE (alpha=beta=1)
    # - {kl: 1.0, scce: 1.0}       # KL + soft complementary CE
    # - {kl: 1.0, gce: 1.0}        # mixture of KL and GCE
    - {kl: 1.0, socce: 10e-2}
    - {kl: 1.0, socce: 10e-3}
    - {kl: 1.0, socce: 10e-4}
    - {kl: 1.0, socce: 10e-5}
    - {kl: 1.0, socce: 10e-6}
  factor: 1
  num_crop: 5
  mipc: 300
  re_epochs: 300

experiments:
  - name: cifar100_conv3
    dataset: cifar100
    arch: conv3


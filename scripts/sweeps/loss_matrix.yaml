# Loss matrix: KL baseline and KL+sOCCE gamma sweep on the canonical
# cifar100/resnet18_modified cell. The conv3 block is already complete
# (see logs/socce_diagnosis.md); resnet18_modified is the new target.
# Uses the list-of-dicts shape for `weights:` (one cell per dict).
#
# Run: python scripts/run_sweep.py scripts/sweeps/loss_matrix.yaml [--resume] [--dry-run]
#
# Active cells: 1 (dataset, arch) block x 3 ipcs x 3 seeds x 6 weight configs = 54.

defaults:
  seed: [42, 43, 44]
  ipc: [10]
  weights:
    # - {kl: 1.0}                  # stock RDED baseline
    # - {kl: 1.0, ockl: 1.0}       # KL + one-cold KL (existing)
    # - {gce: 1.0}                 # pure GCE (q=0.7 default via --gce-q)
    # - {kl: 1.0, rce: 1.0}        # SCE = alpha*CE + beta*RCE (alpha=beta=1)
    # - {kl: 1.0, scce: 1.0}       # KL + soft complementary CE
    # - {kl: 1.0, gce: 1.0}        # mixture of KL and GCE
    - {kl: 1.0, socce: 10e-2}
    - {kl: 1.0, socce: 10e-3}
    - {kl: 1.0, socce: 10e-4}
    - {kl: 1.0, socce: 10e-5}
    - {kl: 1.0, socce: 10e-6}
  factor: 1
  num_crop: 5
  mipc: 300
  re_epochs: 300

experiments:
  - name: cifar100_conv3            # done (see logs/socce_diagnosis.md)
    dataset: cifar100
    arch: conv3

  - name: cifar100_resnet18
    dataset: cifar100
    arch: resnet18_modified


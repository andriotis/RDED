# Phase-1 pilot: compare KL-only baseline, current ockl (known: ~-2%), and
# ockl_logitneg (predicted: descends with KL, no NC tightening). Scoped to
# cifar100/conv3/ipc=10 -- the most signal-rich cell in prior sweeps
# (3-seed std < 0.5%, easy to detect a 1% effect).
#
# Variants under test:
#   - ockl          - reference (negated-softmax vs inverted target P_inv)
#   - ockl_logitneg - negate teacher logits (not probs); shares KL's minimum
#
# Success criterion: any variant matches or beats KL-only (~48.5%) while
# preserving the nc1 reduction (target nc1 <= 8.5). If that hits, expand
# to ipc in {1, 10, 50} and add tinyimagenet.
#
# Run: python scripts/run_sweep.py scripts/sweeps/ockl_help_v1.yaml [--resume] [--dry-run]
#
# Cells: 3 weight configs x 3 seeds = 9 runs total.

defaults:
  seed: [42, 43, 44]
  ipc: [1, 10, 50]
  # monitor: "ockl,ockl_logitneg"
  factor: 1
  num_crop: 5
  mipc: 300
  re_epochs: 300

experiments:
  - name: cifar100_conv3
    dataset: cifar100
    arch: conv3
    weights:
      - {kl: 1.0}                          # baseline (KL only)
      - {kl: 1.0, ockl: 1.0}               # reference (known: ~-2%)
      - {kl: 1.0, ockl_logitneg: 1.0}      # negate teacher logits, not probs (shares KL's min)
